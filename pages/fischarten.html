<!DOCTYPE html>
<!--
  pages/fischarten.html — Seite des Fischarten-Moduls
  Lädt Styling, Lerndaten (data.js), Navigation (app.js) und die
  Modul-Logik (fischarten.js). Inhalt wird per JS in #app erzeugt.
-->
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fischarten · Fischerprüfung NRW</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-base="../" data-page="fischarten">

  <header class="site-header"></header>

  <main>
    <div class="container">
      <div class="page-head">
        <span class="kicker">Modul 3</span>
        <h1>Fischarten erkennen</h1>
        <p>49 heimische Arten nach den amtlichen Bildtafeln (Anlage 3 der
           FischprüfungsVO NRW). Lerne die Steckbriefe mit Merkmalen, Schonmaßen
           und Laichzeiten – und teste dich anschließend im Bildquiz.</p>
      </div>

      <!-- Hier rendert fischarten.js den Modul-Inhalt -->
      <div id="app"></div>
    </div>
  </main>

  <footer class="site-footer"></footer>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/fischarten.js"></script>
</body>
</html>
